<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070708" />

    <!-- apply saved/preferred theme before paint to avoid a flash -->
    <script>
      try {
        const pref = localStorage.getItem("theme"); // "light" | "dark" | absent (= system)
        document.documentElement.dataset.theme = pref === "light" || pref === "dark"
                ? pref
                : matchMedia("(prefers-color-scheme: light)").matches
                        ? "light"
                        : "dark";
      } catch {}
    </script>

    <!-- favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <title>Daniel Metzner — Full-stack Developer</title>
    <link rel="canonical" href="https://daniel.metzner.uk/" />
    <meta
      name="description"
      content="Daniel Metzner — full-stack developer. Code, projects and where to find me."
    />

    <!-- Open Graph / social cards -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Daniel Metzner — Full-stack Developer" />
    <meta
      property="og:description"
      content="Full-stack developer. Code, projects and where to find me."
    />
    <meta property="og:url" content="https://daniel.metzner.uk" />
    <meta property="og:image" content="https://daniel.metzner.uk/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://daniel.metzner.uk/og.png" />
    <!-- fonts are self-hosted (see src/fonts.css) — no third-party requests -->
  </head>
  <body>
    <!-- Static fallback for non-JS crawlers/scrapers. React replaces #root's
         contents on mount, so this is never seen by users on a normal load.
         Mirrors the hero copy so the page has real text even before JS runs. -->
    <div id="root">
      <main style="max-width: 720px; margin: 12vh auto; padding: 0 24px; font-family: system-ui, sans-serif; color: #e7e7ea">
        <h1>Daniel Metzner</h1>
        <p>Full-stack Developer · based in Austria.</p>
        <p>
          I build from the database up to the pixels — robust, usable systems,
          open source, software security, and mentoring.
        </p>
        <p>
          <a href="https://www.linkedin.com/in/daniel-metzner/" style="color: #2ee6e6">LinkedIn</a>
          ·
          <a href="https://github.com/dmetzner" style="color: #2ee6e6">GitHub</a>
        </p>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
