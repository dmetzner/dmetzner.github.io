<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070708" />

    <!-- apply saved/preferred theme before paint to avoid a flash -->
    <script>
      try {
        const pref = localStorage.getItem("theme"); // "light" | "dark" | absent (= system)
        document.documentElement.dataset.theme = pref === "light" || pref === "dark"
                ? pref
                : matchMedia("(prefers-color-scheme: light)").matches
                        ? "light"
                        : "dark";
      } catch {}
    </script>

    <!-- favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <title>Daniel Metzner — Full-stack Developer</title>
    <meta
      name="description"
      content="Daniel Metzner — full-stack developer. Code, projects and where to find me."
    />

    <!-- Open Graph / social cards -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Daniel Metzner — Full-stack Developer" />
    <meta
      property="og:description"
      content="Full-stack developer. Code, projects and where to find me."
    />
    <meta property="og:url" content="https://daniel.metzner.uk" />
    <meta property="og:image" content="https://daniel.metzner.uk/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://daniel.metzner.uk/og.png" />
    <!-- fonts are self-hosted (see src/fonts.css) — no third-party requests -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
